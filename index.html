<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Astronavis</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Elegant geometric font closer to the original concept -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="background-overlay"></div>

  <header class="topbar">

  <main class="hero">

    <section class="hero-logo">
      <img src="assets/logo/stella.png" alt="Astronavis emblem">

    <section class="hero-content">

      <p class="eyebrow">
        GALACTIC CARTOGRAPHY & NAVIGATION
      </p>

      <h1>
        ASTRONAVIS

      <div class="divider"></div>

        Navigate with precision

      <p class="subtitle">
        A new stellar navigation experience is taking shape beyond the known routes.
      </p>

      <p class="coming-soon">
        We'll guide you... very soon.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="mailto:hello@astronavis.io">
          CONTACT US
        </a>

        <a class="btn btn-secondary" href="https://github.com/astronavis-dev">
          GITHUB
        </a>

  <footer>
    © 2026 Astronavis · hello@astronavis.io
